<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>泡泡点点点 🫧</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', sans-serif;
      overflow: hidden;
      width: 100vw; height: 100vh;
      background: #0a1f1a;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ══ AVATAR FOREST BACKGROUND ══ */
    #garden {
      position: fixed;
      inset: 0;
      z-index: 0;
      /* Deep Pandora sky: dark teal-blue to misty green */
      background: linear-gradient(180deg,
        #071a2e 0%,
        #0d3348 18%,
        #0a4a3a 38%,
        #0e5c3a 55%,
        #1a6b35 72%,
        #1f7a30 85%,
        #256b28 100%
      );
      overflow: hidden;
    }

    /* Magical light rays from above */
    #garden::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 60%;
      background:
        conic-gradient(from 260deg at 30% -10%, transparent 15deg, #4ade8011 18deg, transparent 22deg),
        conic-gradient(from 270deg at 55% -5%,  transparent 15deg, #a3f0c011 18deg, transparent 22deg),
        conic-gradient(from 255deg at 75% -8%,  transparent 15deg, #6ee7b711 18deg, transparent 22deg);
      pointer-events: none;
      animation: rayShift 12s ease-in-out infinite alternate;
    }
    @keyframes rayShift {
      0%   { opacity: 0.6; transform: scaleX(1); }
      100% { opacity: 1;   transform: scaleX(1.04); }
    }

    /* ── Mist layers ── */
    .mist {
      position: absolute;
      left: -20%; right: -20%;
      height: 120px;
      border-radius: 50%;
      pointer-events: none;
      animation: mistDrift ease-in-out infinite alternate;
    }
    @keyframes mistDrift {
      0%   { transform: translateX(-3%) scaleY(1); opacity: var(--op); }
      100% { transform: translateX(3%)  scaleY(1.1); opacity: calc(var(--op) * 0.7); }
    }

    /* ── Background giant trees (silhouette) ── */
    .bg-tree {
      position: absolute;
      bottom: 10vh;
      pointer-events: none;
    }
    .bg-tree svg { display: block; }

    /* ── Foreground lush ground ── */
    .ground-layer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      pointer-events: none;
    }

    /* ── Bioluminescent floating seeds (Avatar's Woodsprites) ── */
    .seed {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      animation: seedFloat var(--dur) ease-in-out infinite;
      box-shadow: 0 0 6px 3px #a0ffe888, 0 0 12px 6px #4dffc855;
    }
    @keyframes seedFloat {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.9; }
      30%  { transform: translate(var(--dx1), calc(var(--dy1) * -1)) scale(1.2); opacity: 1; }
      60%  { transform: translate(var(--dx2), calc(var(--dy2) * -2)) scale(0.9); opacity: 0.8; }
      100% { transform: translate(var(--dx3), calc(var(--dy3) * -3.5)) scale(0.3); opacity: 0; }
    }

    /* ── Background ambient birds (silhouettes) ── */
    .ambient-bird {
      position: absolute;
      pointer-events: none;
      font-size: var(--sz);
      opacity: 0.55;
      filter: blur(0.5px) drop-shadow(0 2px 4px #0006);
      animation: ambientFly var(--dur) linear infinite;
    }
    @keyframes ambientFly {
      from { transform: translateX(-120px); opacity: 0; }
      5%   { opacity: 0.5; }
      95%  { opacity: 0.5; }
      to   { transform: translateX(110vw); opacity: 0; }
    }

    /* ── Glowing mushrooms / flowers ── */
    .glow-plant {
      position: absolute;
      bottom: 14vh;
      font-size: var(--sz);
      filter: drop-shadow(0 0 8px var(--glow)) drop-shadow(0 0 16px var(--glow));
      animation: plantSway var(--sway) ease-in-out infinite;
      transform-origin: bottom center;
      pointer-events: none;
    }
    @keyframes plantSway {
      0%,100% { transform: rotate(calc(var(--angle) * -1)); }
      50%      { transform: rotate(var(--angle)); }
    }

    /* ── Giant tree trunks foreground ── */
    .fg-tree {
      position: absolute;
      bottom: 0;
      pointer-events: none;
      opacity: 0.92;
    }

    /* ══ GAME CANVAS ══ */
    #canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ══ BUBBLES ══ */
    .bubble {
      position: fixed;
      border-radius: 50%;
      cursor: pointer;
      pointer-events: all;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
      will-change: transform;
    }
    .bubble:active { transform: scale(0.9); }

    .bubble-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }
    .bubble-inner::before {
      content: '';
      position: absolute;
      top: 12%; left: 18%;
      width: 30%; height: 20%;
      background: #ffffff88;
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    .bubble-inner::after {
      content: '';
      position: absolute;
      top: 20%; left: 55%;
      width: 12%; height: 8%;
      background: #ffffff55;
      border-radius: 50%;
    }

    /* Special bubble pulse */
    .bubble.special {
      animation: specialPulse 1s ease-in-out infinite;
    }
    @keyframes specialPulse {
      0%,100% { box-shadow: 0 0 0 0 #fff6; }
      50%      { box-shadow: 0 0 0 12px #fff0; }
    }

    /* ══ BURST PARTICLES ══ */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      animation: particleFly var(--dur) ease-out forwards;
    }
    @keyframes particleFly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* ══ FLYING BIRDS ══ */
    .flying-bird {
      position: fixed;
      pointer-events: none;
      z-index: 6;
      font-size: var(--size);
      animation: birdFly var(--dur) ease-in forwards;
      filter: drop-shadow(0 4px 8px #0003);
    }
    @keyframes birdFly {
      0%   { transform: translate(0, 0) scale(0.2) rotate(0deg); opacity: 1; }
      20%  { transform: translate(var(--mx), var(--my)) scale(1.2) rotate(var(--rot)); opacity: 1; }
      100% { transform: translate(var(--ex), var(--ey)) scale(0.6) rotate(var(--rot)); opacity: 0; }
    }

    /* ══ SCORE ══ */
    #score-wrap {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: #ffffff55;
      backdrop-filter: blur(8px);
      border: 2px solid #fff8;
      border-radius: 999px;
      padding: 8px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 800;
      color: #2D3A4A;
    }

    /* ══ SCORE POP ══ */
    .score-pop {
      position: fixed;
      pointer-events: none;
      z-index: 8;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 8px #0004;
      animation: scorePop 1s ease-out forwards;
    }
    @keyframes scorePop {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-80px) scale(1.4); opacity: 0; }
    }

    /* ══ BACK BUTTON ══ */
    #back-btn {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 10;
      background: #ffffff55;
      backdrop-filter: blur(8px);
      border: 2px solid #fff8;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: #2D3A4A;
      cursor: pointer;
      text-decoration: none;
    }

    /* ══ CELEBRATE ══ */
    #celebrate {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #00000033;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #celebrate.show {
      opacity: 1;
      pointer-events: all;
    }
    .celebrate-emoji {
      font-size: 6rem;
      animation: celebrateBounce 0.5s ease-in-out infinite alternate;
    }
    @keyframes celebrateBounce {
      from { transform: scale(1) rotate(-5deg); }
      to   { transform: scale(1.15) rotate(5deg); }
    }
    .celebrate-text {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 16px #0004;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<div id="garden"></div>

<canvas id="canvas"></canvas>

<a href="../../index.html" id="back-btn">← 回家</a>

<div id="score-wrap">
  <span>🫧</span>
  <span id="score">0</span>
</div>

<div id="celebrate">
  <div class="celebrate-emoji" id="celebrate-emoji">🦜</div>
  <div class="celebrate-text" id="celebrate-text">好棒！</div>
</div>

<script>
// ══ AVATAR FOREST BUILDER ══
(function buildGarden() {
  const garden = document.getElementById('garden');

  // ── Ground layers (SVG) ──
  const groundSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 220" preserveAspectRatio="none"
    style="position:absolute;bottom:0;left:0;width:100%;height:22vh;display:block;">
    <path d="M0,160 C200,100 400,180 600,130 C800,80 1000,160 1200,120 C1320,100 1400,140 1440,130 L1440,220 L0,220 Z"
      fill="#0f4a1e" opacity="0.95"/>
    <path d="M0,185 C180,155 360,195 540,170 C720,145 900,185 1080,165 C1260,145 1380,175 1440,165 L1440,220 L0,220 Z"
      fill="#0d3d18" opacity="0.9"/>
    <path d="M0,200 C240,188 480,210 720,200 C960,190 1200,208 1440,200 L1440,220 L0,220 Z"
      fill="#0a3014"/>
  </svg>`;
  garden.insertAdjacentHTML('beforeend', groundSVG);

  // ── Giant background tree silhouettes (SVG) ──
  const treeSVGs = [
    { x:'5%',  scale:1.1, opacity:0.45, delay:'0s' },
    { x:'18%', scale:0.85,opacity:0.35, delay:'4s' },
    { x:'72%', scale:1.0, opacity:0.4,  delay:'2s' },
    { x:'85%', scale:1.2, opacity:0.5,  delay:'6s' },
  ];
  treeSVGs.forEach(t => {
    const w = 180 * t.scale;
    const h = 380 * t.scale;
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;bottom:10vh;left:${t.x};opacity:${t.opacity};
      transform:scaleX(${t.scale});transform-origin:bottom center;pointer-events:none;`;
    el.innerHTML = `<svg width="${w}" height="${h}" viewBox="0 0 180 380" xmlns="http://www.w3.org/2000/svg">
      <!-- trunk -->
      <rect x="82" y="240" width="16" height="140" rx="8" fill="#1a4a22"/>
      <rect x="86" y="200" width="8" height="80" rx="4" fill="#122e16"/>
      <!-- canopy layers -->
      <ellipse cx="90" cy="200" rx="78" ry="52" fill="#0e4a1f"/>
      <ellipse cx="90" cy="160" rx="62" ry="46" fill="#125a26"/>
      <ellipse cx="90" cy="124" rx="48" ry="38" fill="#166830"/>
      <ellipse cx="90" cy="94"  rx="36" ry="30" fill="#1a7a38"/>
      <ellipse cx="90" cy="70"  rx="24" ry="22" fill="#20943f"/>
      <!-- bioluminescent dots -->
      <circle cx="60" cy="155" r="3" fill="#7fffb0" opacity="0.7"/>
      <circle cx="115" cy="140" r="2" fill="#a0ffd0" opacity="0.6"/>
      <circle cx="80" cy="105" r="2.5" fill="#7fffb0" opacity="0.8"/>
      <circle cx="100" cy="80" r="2" fill="#b0ffe0" opacity="0.7"/>
    </svg>`;
    garden.appendChild(el);
  });

  // ── Foreground fern/plant silhouettes ──
  const plants = [
    { left:'2%',  sz:'3.2rem', glow:'#4ade80', sway:'3.2s', angle:'5deg' },
    { left:'12%', sz:'2.8rem', glow:'#86efac', sway:'2.8s', angle:'4deg' },
    { left:'24%', sz:'3.5rem', glow:'#34d399', sway:'4s',   angle:'6deg' },
    { left:'38%', sz:'2.4rem', glow:'#6ee7b7', sway:'3s',   angle:'3deg' },
    { left:'52%', sz:'3rem',   glow:'#4ade80', sway:'3.6s', angle:'5deg' },
    { left:'64%', sz:'2.6rem', glow:'#a7f3d0', sway:'2.6s', angle:'4deg' },
    { left:'76%', sz:'3.2rem', glow:'#34d399', sway:'3.8s', angle:'6deg' },
    { left:'88%', sz:'2.8rem', glow:'#6ee7b7', sway:'3.2s', angle:'4deg' },
  ];
  const plantEmojis = ['🌿','🌱','☘️','🍃','🌾','🌿','🍀','🌱'];
  plants.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'glow-plant';
    el.textContent = plantEmojis[i];
    el.style.cssText = `left:${p.left};--sz:${p.sz};--glow:${p.glow};
      --sway:${p.sway};--angle:${p.angle};
      animation-delay:${i * 0.3}s;`;
    garden.appendChild(el);
  });

  // ── Glowing bioluminescent mushrooms ──
  const shrooms = [
    { left:'7%',  emoji:'🍄', glow:'#f0abfc', sz:'2rem' },
    { left:'33%', emoji:'🍄', glow:'#818cf8', sz:'1.6rem' },
    { left:'58%', emoji:'🍄', glow:'#c084fc', sz:'2rem' },
    { left:'82%', emoji:'🍄', glow:'#f0abfc', sz:'1.8rem' },
  ];
  shrooms.forEach(s => {
    const el = document.createElement('div');
    el.className = 'glow-plant';
    el.textContent = s.emoji;
    el.style.cssText = `left:${s.left};--sz:${s.sz};--glow:${s.glow};
      --sway:4s;--angle:3deg;bottom:13.5vh;`;
    garden.appendChild(el);
  });

  // ── Mist layers ──
  const mists = [
    { top:'55%', h:'90px',  color:'#4ade8008', dur:'14s', delay:'0s' },
    { top:'65%', h:'120px', color:'#86efac0a', dur:'18s', delay:'3s' },
    { top:'72%', h:'80px',  color:'#34d39908', dur:'11s', delay:'7s' },
  ];
  mists.forEach(m => {
    const el = document.createElement('div');
    el.className = 'mist';
    el.style.cssText = `top:${m.top};height:${m.h};
      background:radial-gradient(ellipse, ${m.color} 0%, transparent 70%);
      --op:0.8;
      animation-duration:${m.dur};animation-delay:${m.delay};`;
    garden.appendChild(el);
  });

  // ── Floating Woodsprite seeds ──
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'seed';
    const x = Math.random() * 100;
    const startY = 60 + Math.random() * 35;
    const dur = 6 + Math.random() * 8;
    const dx = (Math.random() - 0.5) * 60;
    el.style.cssText = `
      left:${x}%; top:${startY}%;
      --dur:${dur}s;
      --dx1:${dx * 0.3}px; --dy1:${20 + Math.random()*20}px;
      --dx2:${dx * 0.6}px; --dy2:${15 + Math.random()*15}px;
      --dx3:${dx}px;       --dy3:${10 + Math.random()*10}px;
      animation-delay:${Math.random() * dur}s;
      width:${3 + Math.random()*4}px; height:${3 + Math.random()*4}px;
    `;
    garden.appendChild(el);
  }

  // ── Ambient background birds ──
  const ambientBirds = ['🦜','🐦','🦅','🦜','🐦'];
  ambientBirds.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'ambient-bird';
    const top = 8 + Math.random() * 35;
    const dur = 20 + Math.random() * 20;
    el.textContent = b;
    el.style.cssText = `top:${top}%;left:-80px;
      --sz:${1.4 + Math.random() * 1.2}rem;
      --dur:${dur}s;
      animation-delay:${i * 5 + Math.random() * 4}s;`;
    garden.appendChild(el);
  });
})();

// ══ AUDIO ══
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playPop(freq = 520, type = 'sine') {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.6, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.4, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
  osc.start(); osc.stop(ctx.currentTime + 0.25);
}

function playSpecialPop() {
  [440, 550, 660, 880].forEach((f, i) => {
    setTimeout(() => playPop(f, 'triangle'), i * 60);
  });
}

// ══ GAME STATE ══
let score = 0;
const scoreEl = document.getElementById('score');
const bubbles = [];
let specialTimer = 0;

// ══ BUBBLE CONFIG ══
const SIZES = {
  small:  { r: 36, color: ['#FF6B9D','#FF8C42','#FFD93D'], special: false },
  medium: { r: 56, color: ['#4ECDC4','#6BCB77','#A855F7'], special: false },
  large:  { r: 80, color: ['#87CEEB','#b8a9f8','#f9a8d4'], special: false },
};

// Bird config per size
const BIRDS = {
  small:  { emoji: '🦜', count: 3, size: '2rem',  dur: 1.8 },
  medium: { emoji: '🐦', count: 2, size: '2.8rem', dur: 2.2 },
  large:  { emoji: '🦢', count: 1, size: '4rem',   dur: 2.8 },
};

function randomColor(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ══ SPAWN BUBBLE ══
function spawnBubble(isSpecial = false) {
  const sizeKeys = ['small','small','medium','medium','large'];
  const sizeKey = sizeKeys[Math.floor(Math.random() * sizeKeys.length)];
  const cfg = SIZES[sizeKey];
  const r = cfg.r;

  const x = r + Math.random() * (window.innerWidth - r * 2);
  const startY = window.innerHeight + r * 2;
  const color = isSpecial
    ? `radial-gradient(circle at 35% 35%, #fff8, ${randomColor(cfg.color)}, ${randomColor(cfg.color)}88)`
    : `radial-gradient(circle at 35% 35%, #fff6, ${randomColor(cfg.color)}, ${randomColor(cfg.color)}66)`;

  const el = document.createElement('div');
  el.className = 'bubble' + (isSpecial ? ' special' : '');
  el.style.cssText = `
    width:${r*2}px; height:${r*2}px;
    left:${x - r}px; top:${startY}px;
    background: ${color};
    border: 2px solid #ffffff55;
    box-shadow: inset -4px -4px 12px #0001, 0 4px 16px #0002;
  `;

  const inner = document.createElement('div');
  inner.className = 'bubble-inner';
  el.appendChild(inner);

  if (isSpecial) {
    const star = document.createElement('span');
    star.textContent = '✨';
    star.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.4rem;';
    inner.appendChild(star);
  }

  document.body.appendChild(el);

  const speed = 0.4 + Math.random() * 0.5;
  const drift = (Math.random() - 0.5) * 0.6;
  let posX = x - r;
  let posY = startY;

  const bubble = { el, posX, posY, r, speed, drift, sizeKey, isSpecial, alive: true };
  bubbles.push(bubble);

  // Touch/click handler — use larger hit area
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (!bubble.alive) return;
    bubble.alive = false;
    popBubble(bubble, e.clientX, e.clientY);
  }, { passive: false });

  return bubble;
}

// ══ POP BUBBLE ══
function popBubble(bubble, cx, cy) {
  bubble.el.remove();
  const idx = bubbles.indexOf(bubble);
  if (idx > -1) bubbles.splice(idx, 1);

  // Score
  const pts = bubble.sizeKey === 'large' ? 3 : bubble.sizeKey === 'medium' ? 2 : 1;
  score += pts;
  scoreEl.textContent = score;
  showScorePop(cx, cy, '+' + pts);

  // Particles
  spawnParticles(cx, cy, bubble.el.style.background);

  // Sound
  if (bubble.isSpecial) {
    playSpecialPop();
    spawnBirds(cx, cy, bubble.sizeKey);
    showCelebrate(bubble.sizeKey);
  } else {
    const freqs = { small: 600, medium: 480, large: 360 };
    playPop(freqs[bubble.sizeKey]);
  }
}

// ══ PARTICLES ══
function spawnParticles(cx, cy, color) {
  const count = 10;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / count) * Math.PI * 2;
    const dist = 60 + Math.random() * 60;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const size = 6 + Math.random() * 8;
    const dur = 0.4 + Math.random() * 0.3;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${cx - size/2}px; top:${cy - size/2}px;
      background:${color};
      --tx:${tx}px; --ty:${ty}px; --dur:${dur}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000);
  }
}

// ══ FLYING BIRDS ══
function spawnBirds(cx, cy, sizeKey) {
  const cfg = BIRDS[sizeKey];
  for (let i = 0; i < cfg.count; i++) {
    setTimeout(() => {
      const bird = document.createElement('div');
      bird.className = 'flying-bird';

      // Direction: fly toward edge
      const angle = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.8;
      const exitDist = Math.max(window.innerWidth, window.innerHeight) * 1.4;
      const ex = Math.cos(angle) * exitDist;
      const ey = Math.sin(angle) * exitDist;
      const mx = Math.cos(angle) * 80;
      const my = Math.sin(angle) * 80;
      const rot = angle > 0 ? '15deg' : '-15deg';
      const dur = cfg.dur + Math.random() * 0.4;

      bird.textContent = cfg.emoji;
      bird.style.cssText = `
        left:${cx}px; top:${cy}px;
        --size:${cfg.size};
        --dur:${dur}s;
        --mx:${mx}px; --my:${my}px;
        --ex:${ex}px; --ey:${ey}px;
        --rot:${rot};
      `;
      document.body.appendChild(bird);
      setTimeout(() => bird.remove(), dur * 1000 + 100);
    }, i * 120);
  }
}

// ══ SCORE POP ══
function showScorePop(x, y, text) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ══ CELEBRATE ══
const celebrateEl = document.getElementById('celebrate');
const celebrateEmoji = document.getElementById('celebrate-emoji');
const celebrateText = document.getElementById('celebrate-text');

const celebrateData = {
  small:  { emoji: '🦜🦜🦜', text: '虎皮鹦鹉飞出来啦！' },
  medium: { emoji: '🐦🐦',   text: '两只八哥出发咯！' },
  large:  { emoji: '🦢',     text: '大鹈鹕展翅高飞！' },
};

function showCelebrate(sizeKey) {
  const d = celebrateData[sizeKey];
  celebrateEmoji.textContent = d.emoji;
  celebrateText.textContent = d.text;
  celebrateEl.classList.add('show');
  setTimeout(() => celebrateEl.classList.remove('show'), 2200);
}

celebrateEl.addEventListener('pointerdown', () => {
  celebrateEl.classList.remove('show');
});

// ══ GAME LOOP ══
let lastTime = 0;
let spawnTimer = 0;
const SPAWN_INTERVAL = 1200;

function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  // Move bubbles
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.posY -= b.speed * (dt / 16);
    b.posX += b.drift * (dt / 16);
    b.el.style.top  = b.posY + 'px';
    b.el.style.left = b.posX + 'px';

    // Remove if off screen
    if (b.posY < -b.r * 3) {
      b.el.remove();
      bubbles.splice(i, 1);
    }
  }

  // Spawn
  spawnTimer += dt;
  if (spawnTimer > SPAWN_INTERVAL) {
    spawnTimer = 0;
    const isSpecial = Math.random() < 0.18;
    spawnBubble(isSpecial);
  }

  requestAnimationFrame(loop);
}

// Initial bubbles
for (let i = 0; i < 5; i++) {
  const b = spawnBubble();
  b.posY = window.innerHeight * (0.2 + Math.random() * 0.6);
  b.el.style.top = b.posY + 'px';
}

requestAnimationFrame(loop);
</script>
